#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

$rise = $HYPR_SCRIPT_DIR/rise.sh

##############
### SYSTEM ###
##############

# Hyprland Secific
exec-once = hyprpaper &
exec-once = systemctl --user start hyprpolkitagent

# Bar & Tray master
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # System tray required setup

exec-once = eww daemon
exec-once = eww open top_bar

# X11 system tray compatiblity
exec-once = sleep 2s && snixembed &


# Notification Daemon
exec-once = swaync & 

# WIFI - Bluetooth tray
exec-once = blueman-applet & nm-applet

# XD AUTO START
exec-once = dex -a

####################
### APPLICATIONS ###
####################

exec-once = $terminal

# Scriptsg
$notif_script = $HYPR_SCRIPT_DIR/notify-me.sh
exec-once = $notif_script || $rise "[hypr/auto-start] could not load notification services"

# Workspace Specific

exec-once = [workspace 9 silent] flatpak run com.rtosta.zapzap &
exec-once = [workspace 0 silent] flatpak run com.ulduzsoft.Birdtray &
