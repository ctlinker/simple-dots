[main]
# Match your bar's font
font=JetBrains Mono:size=12
prompt="󰍟 "
placeholder="Search applications..."
icon-theme=Papirus-Dark
icons-enabled=yes

# Center it to look like a clean popup
anchor=center
lines=10
width=40
horizontal-pad=40
vertical-pad=15
inner-pad=5

# Match your bar's behavior
line-height=25
letter-spacing=0

# Use 'overlay' to appear over fullscreen windows if needed
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
# Glassy Black Background (80% opacity: cc)
background=000000cc
# Pure White Text
text=ffffffff
# Blue Prompt
prompt=007bffff
# Blue selection background with White text
selection=007bffaa
selection-text=ffffffff
# Highlight matched characters in Blue
match=007bffff
selection-match=ffffffff
# Border color (Blue)
border=007bff66

[border]
width=2
radius=10

[dmenu]
mode=text
exit-immediately-if-empty=no

[key-bindings]
# Add some common shortcuts
cancel=Escape Control+g
execute=Return KP_Enter
prev=Up Control+p
next=Down Control+n